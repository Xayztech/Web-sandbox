<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>WebSandbox v4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#07070f;--surf:#0e0e1c;--surf2:#13132a;
      --b1:#1a1a30;--b2:#222240;
      --acc:#6c47ff;--acc2:#8c6fff;
      --teal:#00c9b1;--red:#ff5050;--grn:#22c55e;
      --tx:#dde1f0;--mu:#5a5a80;--dim:#222248;
      --glow:rgba(108,71,255,.28);
      --bar:50px;--sb:268px;
      --mono:'JetBrains Mono',monospace;
      --sans:'Manrope',sans-serif;
      --r:10px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--sans);}

    /* ─ SHELL ─ */
    #app{display:flex;flex-direction:column;height:100dvh;width:100vw;}

    /* ─ TOPBAR ─ */
    #topbar{
      height:var(--bar);min-height:var(--bar);flex-shrink:0;
      background:var(--surf);border-bottom:1px solid var(--b1);
      display:flex;align-items:center;gap:5px;padding:0 9px;z-index:200;
    }
    .logo{display:flex;align-items:center;gap:7px;font-weight:800;font-size:14px;white-space:nowrap;flex-shrink:0;}
    .logo-icon{width:26px;height:26px;background:var(--acc);border-radius:7px;display:grid;place-items:center;font-size:13px;}
    .logo-txt{letter-spacing:-.3px;}

    .ib{
      width:31px;height:31px;flex-shrink:0;border-radius:8px;
      border:1px solid var(--b2);background:transparent;color:var(--mu);
      font-size:14px;cursor:pointer;display:grid;place-items:center;
      transition:background .12s,color .12s;user-select:none;
    }
    .ib:hover:not(:disabled){background:var(--b1);color:var(--tx);}
    .ib:disabled{opacity:.25;cursor:default;}
    .ib.on{background:var(--acc);border-color:var(--acc);color:#fff;}

    /* ─ URL BAR ─ */
    #urlbar{
      flex:1;min-width:0;height:33px;display:flex;align-items:center;
      background:var(--bg);border:1.5px solid var(--b2);border-radius:8px;
      overflow:hidden;transition:border-color .15s,box-shadow .15s;
    }
    #urlbar:focus-within{border-color:var(--acc);box-shadow:0 0 0 3px var(--glow);}
    #scheme{
      padding:0 8px;font-family:var(--mono);font-size:9.5px;font-weight:700;
      color:var(--teal);white-space:nowrap;border-right:1px solid var(--b2);
      height:100%;display:flex;align-items:center;background:var(--surf);
      letter-spacing:.6px;flex-shrink:0;
    }
    #urli{
      flex:1;min-width:0;background:transparent;border:none;outline:none;
      color:var(--tx);font-family:var(--mono);font-size:12.5px;padding:0 10px;height:100%;
    }
    #urli::placeholder{color:var(--dim);}
    #gobtn{
      height:100%;padding:0 13px;background:var(--acc);border:none;flex-shrink:0;
      color:#fff;font-family:var(--sans);font-weight:800;font-size:12px;
      cursor:pointer;letter-spacing:.4px;transition:background .12s;
    }
    #gobtn:hover{background:var(--acc2);}

    /* ─ MAIN ─ */
    #main{display:flex;flex:1;min-height:0;}

    /* ─ SIDEBAR ─ */
    #sidebar{
      width:var(--sb);flex-shrink:0;
      background:var(--surf);border-right:1px solid var(--b1);
      display:flex;flex-direction:column;overflow:hidden;
      transition:width .2s cubic-bezier(.4,0,.2,1),opacity .2s;
    }
    #sidebar.closed{width:0;opacity:0;pointer-events:none;}

    .stabs{display:flex;flex-shrink:0;border-bottom:1px solid var(--b1);}
    .stab{
      flex:1;padding:9px 0;text-align:center;cursor:pointer;
      font-size:10px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;
      color:var(--mu);border-bottom:2px solid transparent;transition:color .12s,border-color .12s;
      white-space:nowrap;
    }
    .stab.on{color:var(--acc);border-bottom-color:var(--acc);}
    .stab:hover:not(.on){color:var(--tx);}

    .spanel{flex:1;min-height:0;overflow-y:auto;padding:8px;display:none;flex-direction:column;}
    .spanel.on{display:flex;}
    .spanel::-webkit-scrollbar{width:3px;}
    .spanel::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;}

    .slabel{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);padding:7px 4px 4px;}

    /* ─ SIDEBAR ITEMS ─ */
    .si{
      display:flex;align-items:center;gap:7px;padding:7px 8px;
      border-radius:8px;cursor:pointer;margin-bottom:2px;min-width:0;
      border:1px solid transparent;transition:background .1s,border-color .1s;
    }
    .si:hover{background:var(--surf2);border-color:var(--b2);}
    .si.cur{background:rgba(108,71,255,.1);border-color:rgba(108,71,255,.25);}
    .si-ico{font-size:13px;flex-shrink:0;width:17px;text-align:center;}
    .si-body{flex:1;min-width:0;}
    .si-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--tx);}
    .si-url{font-size:10px;font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--mu);}
    .si-del{
      width:19px;height:19px;display:grid;place-items:center;flex-shrink:0;
      background:none;border:none;color:var(--dim);cursor:pointer;border-radius:4px;
      font-size:12px;opacity:0;transition:opacity .1s,color .1s;
    }
    .si:hover .si-del{opacity:1;}
    .si-del:hover{color:var(--red);}

    .sempty{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;color:var(--dim);font-size:11px;line-height:2;gap:4px;
    }
    .sempty-ico{font-size:24px;}

    .sclear{
      margin-top:auto;padding:7px 10px;background:transparent;
      border:1px solid var(--b2);border-radius:8px;color:var(--mu);
      cursor:pointer;font-family:var(--sans);font-size:11px;font-weight:700;
      transition:background .12s,color .12s,border-color .12s;
    }
    .sclear:hover{background:var(--red);border-color:var(--red);color:#fff;}

    /* ─ CONTENT ─ */
    #content{flex:1;min-width:0;display:flex;flex-direction:column;position:relative;overflow:hidden;}

    /* ─ HOME ─ */
    #home{
      position:absolute;inset:0;z-index:10;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:24px;padding:20px;background:var(--bg);
    }
    .h-hero{text-align:center;}
    .h-hero h1{
      font-size:clamp(28px,6vw,58px);font-weight:800;letter-spacing:-2.5px;
      line-height:1.05;margin-bottom:10px;
      background:linear-gradient(135deg,var(--acc),var(--teal));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .h-hero p{font-size:12px;color:var(--mu);font-family:var(--mono);}
    .h-box{
      width:min(560px,100%);background:var(--surf);border:1.5px solid var(--b2);
      border-radius:14px;overflow:hidden;box-shadow:0 0 48px var(--glow);
    }
    .h-box:focus-within{border-color:var(--acc);}
    .h-row{display:flex;align-items:center;padding:12px 14px;gap:8px;}
    .h-globe{font-size:16px;}
    #hi{
      flex:1;min-width:0;background:transparent;border:none;outline:none;
      color:var(--tx);font-family:var(--mono);font-size:13px;
    }
    #hi::placeholder{color:var(--dim);}
    #hgo{
      padding:8px 18px;background:var(--acc);border:none;border-radius:8px;
      color:#fff;font-family:var(--sans);font-weight:800;font-size:12px;
      cursor:pointer;flex-shrink:0;transition:background .12s;
    }
    #hgo:hover{background:var(--acc2);}
    .chips{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;width:min(560px,100%);}
    .chip{
      padding:5px 12px;background:var(--surf);border:1px solid var(--b2);
      border-radius:20px;font-size:11px;font-family:var(--mono);color:var(--mu);
      cursor:pointer;transition:all .12s;
    }
    .chip:hover{background:var(--surf2);border-color:var(--acc);color:var(--tx);}
    .h-badge{font-size:10px;font-family:var(--mono);color:var(--mu);display:flex;align-items:center;gap:6px;}
    .h-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);}

    /* ─ OVERLAYS ─ */
    .ov{
      position:absolute;inset:0;z-index:20;display:none;flex-direction:column;
      align-items:center;justify-content:center;background:var(--bg);gap:16px;
      padding:32px;text-align:center;
    }
    .ov.show{display:flex;}
    .spin{
      width:42px;height:42px;border-radius:50%;
      border:3px solid var(--b2);border-top-color:var(--acc);
      animation:spin .7s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
    .ov-url{font-family:var(--mono);font-size:12px;color:var(--mu);max-width:360px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
    .ov-tip{font-size:10px;color:var(--dim);font-family:var(--mono);}

    .err-code{font-size:72px;font-weight:900;letter-spacing:-5px;color:var(--red);line-height:1;}
    .err-msg{font-size:13px;color:var(--mu);max-width:460px;line-height:1.75;}
    .err-url{font-size:10px;font-family:var(--mono);color:var(--dim);word-break:break-all;max-width:460px;}
    .ebts{display:flex;gap:10px;}
    .btn-p{padding:9px 22px;background:var(--acc);border:none;border-radius:8px;color:#fff;font-family:var(--sans);font-weight:800;font-size:12px;cursor:pointer;transition:background .12s;}
    .btn-p:hover{background:var(--acc2);}
    .btn-s{padding:9px 22px;background:transparent;border:1px solid var(--b2);border-radius:8px;color:var(--tx);font-family:var(--sans);font-weight:700;font-size:12px;cursor:pointer;}

    /* ─ IFRAME ─ */
    #frame{flex:1;border:none;background:#fff;display:none;width:100%;min-height:0;}

    /* ─ STATUSBAR ─ */
    #statusbar{
      height:21px;background:var(--surf);border-top:1px solid var(--b1);
      display:flex;align-items:center;padding:0 12px;gap:10px;flex-shrink:0;
    }
    .sdot{width:5px;height:5px;border-radius:50%;background:var(--dim);flex-shrink:0;}
    .sdot.ok{background:var(--grn);}
    .sdot.busy{background:var(--acc);animation:pulse 1s infinite;}
    .sdot.err{background:var(--red);}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
    #stxt{flex:1;font-size:10px;font-family:var(--mono);color:var(--dim);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
    #ssid{font-size:10px;font-family:var(--mono);color:var(--dim);white-space:nowrap;flex-shrink:0;}

    /* ─ TOASTS ─ */
    #toasts{position:fixed;bottom:34px;right:14px;z-index:9999;display:flex;flex-direction:column-reverse;gap:7px;pointer-events:none;}
    .toast{
      padding:9px 13px;background:var(--surf2);border:1px solid var(--b2);
      border-radius:8px;font-size:11px;color:var(--tx);
      box-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:all;
      animation:tslide .18s ease-out;display:flex;align-items:center;gap:7px;
    }
    .toast.ok{border-color:var(--grn);}
    .toast.err{border-color:var(--red);}
    @keyframes tslide{from{transform:translateX(16px);opacity:0;}}

    /* ─ RESPONSIVE ─ */
    @media(max-width:640px){
      :root{--sb:100vw;}
      #sidebar{position:absolute;top:0;bottom:0;left:0;z-index:150;box-shadow:4px 0 24px rgba(0,0,0,.6);}
      #sidebar.closed{width:0;}
      .logo-txt{display:none;}
    }
    @media(max-width:380px){
      #gobtn{padding:0 8px;font-size:11px;}
      #topbar{gap:3px;padding:0 5px;}
    }
  </style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="logo">
      <div class="logo-icon">🛡</div>
      <span class="logo-txt">WebSandbox</span>
    </div>
    <button class="ib" id="btn-sb"  title="Sidebar">☰</button>
    <button class="ib" id="btn-bk"  title="Back"    disabled>‹</button>
    <button class="ib" id="btn-fw"  title="Forward" disabled>›</button>
    <button class="ib" id="btn-rl"  title="Reload">↺</button>
    <button class="ib" id="btn-hm"  title="Home">⌂</button>
    <div id="urlbar">
      <div id="scheme">SANDBOX</div>
      <input id="urli" type="text" placeholder="Enter any URL to sandbox…" autocomplete="off" spellcheck="false"/>
      <button id="gobtn">GO</button>
    </div>
    <button class="ib" id="btn-star" title="Bookmark">☆</button>
    <button class="ib" id="btn-ext"  title="Open real URL in new tab">↗</button>
  </div>

  <!-- MAIN -->
  <div id="main">

    <!-- SIDEBAR -->
    <div id="sidebar" class="closed">
      <div class="stabs">
        <div class="stab on" data-panel="history">⏱ History</div>
        <div class="stab"    data-panel="bookmarks">☆ Saved</div>
      </div>
      <div class="spanel on" id="panel-history">
        <div class="slabel">Browsing History</div>
        <div id="hist"></div>
        <button class="sclear" id="btn-clrhist">Clear all history</button>
      </div>
      <div class="spanel" id="panel-bookmarks">
        <div class="slabel">Bookmarks</div>
        <div id="bkms"></div>
      </div>
    </div>

    <!-- CONTENT -->
    <div id="content">

      <!-- HOME SCREEN -->
      <div id="home">
        <div class="h-hero">
          <h1>WebSandbox</h1>
          <p>// proxy-isolated browser · sessions saved locally · v4</p>
        </div>
        <div class="h-box">
          <div class="h-row">
            <span class="h-globe">🌐</span>
            <input id="hi" type="url" inputmode="url" placeholder="https://example.com" autocomplete="off" spellcheck="false"/>
            <button id="hgo">Browse</button>
          </div>
        </div>
        <div class="chips">
          <div class="chip" data-url="https://wikipedia.org">wikipedia</div>
          <div class="chip" data-url="https://news.ycombinator.com">hacker news</div>
          <div class="chip" data-url="https://github.com">github</div>
          <div class="chip" data-url="https://developer.mozilla.org">mdn</div>
          <div class="chip" data-url="https://stackoverflow.com">stackoverflow</div>
          <div class="chip" data-url="https://www.reddit.com">reddit</div>
          <div class="chip" data-url="https://www.bbc.com/news">bbc news</div>
          <div class="chip" data-url="https://www.wikipedia.org/wiki/Special:Random">random wiki</div>
        </div>
        <div class="h-badge">
          <div class="h-dot"></div>
          <span id="home-sid">Initializing…</span>
        </div>
      </div>

      <!-- LOADING -->
      <div class="ov" id="ov-load">
        <div class="spin"></div>
        <div class="ov-url" id="load-url">Fetching…</div>
        <div class="ov-tip" id="load-tip">Connecting…</div>
      </div>

      <!-- ERROR -->
      <div class="ov" id="ov-err">
        <div class="err-code">ERR</div>
        <div class="err-msg" id="err-msg">Failed to load the page.</div>
        <div class="err-url" id="err-url"></div>
        <div class="ebts">
          <button class="btn-p" id="btn-retry">↺ Retry</button>
          <button class="btn-s" id="btn-errhm">⌂ Home</button>
        </div>
      </div>

      <!-- IFRAME -->
      <iframe id="frame"
        allow="scripts; forms; same-origin; popups; pointer-lock; downloads"
        referrerpolicy="no-referrer-when-downgrade"
        title="Sandbox">
      </iframe>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div id="statusbar">
    <div class="sdot" id="sdot"></div>
    <div id="stxt">Ready</div>
    <div id="ssid">—</div>
  </div>
</div>
<div id="toasts"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   WebSandbox v4 — Frontend
   KEY CHANGES vs v3:
   ✔ All state (history, bookmarks, cookies, navStack) stored 100% in localStorage
   ✔ Server is stateless — no dependency on server-side memory
   ✔ Cookies collected from X-Wsb-Cookies headers and stored per-domain in localStorage
   ✔ Cookies sent back to server as query param on each proxy request
   ✔ History items navigate correctly (fixed event handling)
   ✔ Sidebar toggle does NOT affect iframe
   ✔ Load tips rotate for UX feedback
   ✔ message listener handles all wsb_ events from injected script
═══════════════════════════════════════════════════════════════════════ */
'use strict';

// ── HELPERS ──────────────────────────────────────────────────────────────────
const G  = id => document.getElementById(id);
const frame   = G('frame');
const ovLoad  = G('ov-load');
const ovErr   = G('ov-err');
const homeEl  = G('home');
const sidebar = G('sidebar');
const urli    = G('urli');
const sdot    = G('sdot');
const stxt    = G('stxt');

// ── PERSISTENT STATE ──────────────────────────────────────────────────────────
// ALL state in localStorage so it survives reloads, tab closes, browser restarts
// Server is STATELESS — it doesn't store anything
const K = {
  SID:     'wsb4_sid',
  HIST:    'wsb4_hist',
  BKMS:    'wsb4_bkms',
  NAV:     'wsb4_nav',
  NAVIDX:  'wsb4_navidx',
  CURURL:  'wsb4_cururl',
  CURTITL: 'wsb4_curtitl',
  COOKIES: 'wsb4_cookies',   // per-domain cookies: { domain: "name=val; ..." }
};

function lsGet(k, fallback) {
  try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function lsSet(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
}

let sessionId  = lsGet(K.SID, null) || ('wsb4-' + Math.random().toString(36).slice(2,10));
let history2   = lsGet(K.HIST, []);    // rename to avoid clash with window.history
let bookmarks  = lsGet(K.BKMS, []);
let navStack   = lsGet(K.NAV, []);
let navIdx     = lsGet(K.NAVIDX, -1);
let curUrl     = lsGet(K.CURURL, '');
let curTitle   = lsGet(K.CURTITL, '');
let cookieJar  = lsGet(K.COOKIES, {}); // { "hostname": "name=val; name2=val2" }

lsSet(K.SID, sessionId);
if (curUrl) urli.value = curUrl;

function save() {
  lsSet(K.HIST,    history2);
  lsSet(K.BKMS,   bookmarks);
  lsSet(K.NAV,    navStack);
  lsSet(K.NAVIDX, navIdx);
  lsSet(K.CURURL,  curUrl);
  lsSet(K.CURTITL, curTitle);
  lsSet(K.COOKIES, cookieJar);
}

// Auto-save
setInterval(save, 5000);
window.addEventListener('beforeunload', save);
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') save(); });

// ── COOKIE MANAGEMENT ────────────────────────────────────────────────────────
// Cookies set by proxied pages come back in X-Wsb-Cookies header
// We store them in localStorage and send them back on next request to same domain

function storeCookiesFromHeader(headerVal, targetUrl) {
  if (!headerVal) return;
  let list;
  try { list = JSON.parse(headerVal); } catch { return; }
  if (!Array.isArray(list)) return;

  let hostname = '';
  try { hostname = new URL(targetUrl).hostname.replace(/^www\./, ''); } catch { return; }

  const existing = (cookieJar[hostname] || '').split('; ').filter(Boolean);
  const map = {};
  existing.forEach(c => { const [n] = c.split('='); if (n) map[n.trim()] = c; });

  list.forEach(raw => {
    if (!raw) return;
    const parts = raw.split(';');
    const kv    = (parts[0] || '').trim();
    const name  = kv.split('=')[0].trim();
    if (name) map[name] = kv;
  });

  cookieJar[hostname] = Object.values(map).join('; ');
  lsSet(K.COOKIES, cookieJar);
}

function getCookiesForUrl(url) {
  try {
    const hostname = new URL(url).hostname.replace(/^www\./, '');
    const cookies  = [];
    // Match exact domain and parent domains
    Object.entries(cookieJar).forEach(([domain, val]) => {
      if (hostname === domain || hostname.endsWith('.' + domain) || domain.endsWith('.' + hostname)) {
        if (val) cookies.push(val);
      }
    });
    return cookies.join('; ').trim();
  } catch { return ''; }
}

// ── NAVIGATION ───────────────────────────────────────────────────────────────
const TIPS = [
  'Sending request…',
  'Trying Chrome fingerprint…',
  'Trying Firefox fingerprint…',
  'Rewriting HTML…',
  'Almost there…',
];
let tipTimer = null;
let tipI     = 0;
let loadTimer = null;
let curLoadUrl = '';

function norm(raw) {
  if (!raw) return null;
  raw = raw.trim();
  if (!raw) return null;
  if (!/^https?:\/\//i.test(raw)) raw = 'https://' + raw;
  try { return new URL(raw).href; } catch { return null; }
}

function navigate(rawUrl) {
  const url = norm(rawUrl);
  if (!url) { toast('Invalid URL', 'err'); return; }

  // Update nav stack
  if (navIdx < navStack.length - 1) navStack = navStack.slice(0, navIdx + 1);
  if (navStack[navStack.length - 1] !== url) {
    navStack.push(url);
    navIdx = navStack.length - 1;
  }
  _doLoad(url);
}

function _doLoad(url) {
  curLoadUrl = url;
  curUrl     = url;
  urli.value = url;
  lsSet(K.CURURL, url);

  homeEl.style.display  = 'none';
  frame.style.display   = 'none';
  ovErr.classList.remove('show');
  ovLoad.classList.add('show');

  G('load-url').textContent = url;
  tipI = 0;
  G('load-tip').textContent = TIPS[0];
  clearInterval(tipTimer);
  tipTimer = setInterval(() => {
    tipI = (tipI + 1) % TIPS.length;
    G('load-tip').textContent = TIPS[tipI];
  }, 3500);

  setStatus('busy', 'Loading ' + url);
  updateNav();

  clearTimeout(loadTimer);
  loadTimer = setTimeout(() => {
    clearInterval(tipTimer);
    ovLoad.classList.remove('show');
    showErr('Request timed out (30s). Site may be unreachable or very slow.', url);
  }, 30000);

  // Build proxy URL — pass cookies for this domain as query param
  const ck = getCookiesForUrl(url);
  let proxyUrl = `/p?u=${encodeURIComponent(url)}&s=${encodeURIComponent(sessionId)}`;
  if (ck) proxyUrl += `&ck=${encodeURIComponent(ck)}`;

  frame.src = proxyUrl;
}

// When iframe finishes loading
frame.addEventListener('load', () => {
  clearTimeout(loadTimer);
  clearInterval(tipTimer);

  const src = frame.src;
  if (!src || src === 'about:blank' || src === location.href) return;

  // Try to read cookies from the proxied page response
  // (cookies come via postMessage from injected script, or X-Wsb-Cookies header)
  try {
    // Check iframe for error content
    const doc = frame.contentDocument;
    if (doc) {
      const txt = (doc.body || {}).innerText || '';
      // If it's our error page it'll postMessage — handled in message listener
    }
  } catch {}

  // Read response headers: we use a HEAD request to /p to get X-Wsb-* headers
  // Actually, we check them via postMessage from the injected script
  // Just show the iframe
  ovLoad.classList.remove('show');
  frame.style.display = 'block';

  let iTitle = curTitle;
  try { const doc = frame.contentDocument; if (doc && doc.title) iTitle = doc.title.trim(); } catch {}

  setStatus('ok', 'Loaded: ' + curLoadUrl);
  addHistory(curLoadUrl, iTitle || curLoadUrl);
  curTitle = iTitle || curLoadUrl;
  save();
});

frame.addEventListener('error', () => {
  clearTimeout(loadTimer);
  clearInterval(tipTimer);
  ovLoad.classList.remove('show');
  showErr('Iframe failed to load. The site may block framing.', curLoadUrl);
});

// ── POSTMESSAGE FROM INJECTED INTERCEPTOR ────────────────────────────────────
window.addEventListener('message', e => {
  if (!e.data || typeof e.data !== 'object') return;
  const d = e.data;

  switch (d.type) {

    case 'wsb_nav':
      // User clicked a link inside sandboxed page
      if (d.url) {
        clearTimeout(loadTimer);
        clearInterval(tipTimer);
        navigate(d.url);
      }
      break;

    case 'wsb_loaded':
      // Page finished loading inside iframe
      clearTimeout(loadTimer);
      clearInterval(tipTimer);
      ovLoad.classList.remove('show');
      frame.style.display = 'block';
      if (d.url) { curUrl = d.url; urli.value = d.url; }
      if (d.title) curTitle = d.title;
      if (d.cookies) storeCookiesFromHeader(JSON.stringify(d.cookies), curLoadUrl);
      addHistory(d.url || curLoadUrl, d.title || curLoadUrl);
      setStatus('ok', 'Loaded: ' + (d.url || curLoadUrl));
      save();
      break;

    case 'wsb_softNav':
      // SPA navigation (pushState)
      if (d.url) {
        curUrl = d.url;
        urli.value = d.url;
        addHistory(d.url, d.title || d.url);
        save();
      }
      break;

    case 'wsb_error':
      clearTimeout(loadTimer);
      clearInterval(tipTimer);
      ovLoad.classList.remove('show');
      frame.style.display = 'none';
      showErr(d.message || 'Failed to load', d.url || curLoadUrl);
      break;

    case 'wsb_retry':
      if (d.url) { ovErr.classList.remove('show'); navigate(d.url); }
      break;

    case 'wsb_home':
      goHome();
      break;
  }
});

// Also intercept cookies from frame's response headers via fetch
// (We load the proxy URL in a fetch to get headers, then set iframe.src)
// This is done by checking frame load and reading custom headers

function showErr(msg, url) {
  frame.style.display = 'none';
  try { frame.src = 'about:blank'; } catch {}
  ovLoad.classList.remove('show');
  ovErr.classList.add('show');
  G('err-msg').textContent = msg || 'Unknown error';
  G('err-url').textContent = url || '';
  setStatus('err', 'Error');
}

function goHome() {
  clearTimeout(loadTimer);
  clearInterval(tipTimer);
  try { frame.src = 'about:blank'; } catch {}
  frame.style.display  = 'none';
  ovLoad.classList.remove('show');
  ovErr.classList.remove('show');
  homeEl.style.removeProperty('display');
  urli.value = '';
  setStatus('', 'Ready');
}

function updateNav() {
  G('btn-bk').disabled = navIdx <= 0;
  G('btn-fw').disabled = navIdx >= navStack.length - 1;
}

function setStatus(type, text) {
  sdot.className = 'sdot' + (type ? ' ' + type : '');
  stxt.textContent = text;
}

// ── HISTORY ──────────────────────────────────────────────────────────────────
function addHistory(url, title) {
  if (!url) return;
  // Deduplicate consecutive same URL
  const last = history2[history2.length - 1];
  if (last && last.url === url) { last.title = title || last.title; renderHist(); return; }
  history2.push({ url, title: title || url, t: Date.now() });
  if (history2.length > 500) history2 = history2.slice(-500);
  renderHist();
}

function removeHistory(idx) {
  history2.splice(idx, 1);
  renderHist();
  save();
}

// ── BOOKMARKS ────────────────────────────────────────────────────────────────
function addBookmark() {
  if (!curUrl) { toast('Navigate to a page first', 'err'); return; }
  if (bookmarks.find(b => b.url === curUrl)) { toast('Already bookmarked', 'err'); return; }
  bookmarks.push({ url: curUrl, title: curTitle || curUrl, t: Date.now() });
  renderBkms();
  save();
  updateStarBtn();
  toast('Bookmarked!', 'ok');
}

function removeBookmark(url) {
  bookmarks = bookmarks.filter(b => b.url !== url);
  renderBkms();
  save();
  updateStarBtn();
}

function updateStarBtn() {
  const on = bookmarks.some(b => b.url === curUrl);
  G('btn-star').classList.toggle('on', on);
  G('btn-star').textContent = on ? '★' : '☆';
  G('btn-star').title = on ? 'Bookmarked' : 'Bookmark this page';
}

// ── RENDER SIDEBAR ────────────────────────────────────────────────────────────
function renderHist() {
  const el = G('hist');
  if (!history2.length) {
    el.innerHTML = '<div class="sempty"><div class="sempty-ico">⏱</div>No history yet.<br>Start browsing!</div>';
    return;
  }
  el.innerHTML = '';
  // Newest first
  [...history2].reverse().forEach((h, ri) => {
    const realIdx = history2.length - 1 - ri;
    const div = document.createElement('div');
    div.className = 'si' + (h.url === curUrl ? ' cur' : '');
    div.innerHTML =
      `<span class="si-ico">${emoji(h.url)}</span>
       <div class="si-body">
         <div class="si-title">${esc(h.title || h.url)}</div>
         <div class="si-url">${esc(short(h.url))}</div>
       </div>
       <button class="si-del" title="Remove">✕</button>`;
    // FIX: Use separate event listener, not onclick string, to avoid closure bugs
    div.querySelector('.si-del').addEventListener('click', ev => {
      ev.stopPropagation();
      removeHistory(realIdx);
    });
    div.addEventListener('click', () => {
      navigate(h.url);
      if (window.innerWidth <= 640) sidebar.classList.add('closed');
    });
    el.appendChild(div);
  });
}

function renderBkms() {
  const el = G('bkms');
  if (!bookmarks.length) {
    el.innerHTML = '<div class="sempty"><div class="sempty-ico">☆</div>No bookmarks yet.<br>Press ☆ to save a page.</div>';
    return;
  }
  el.innerHTML = '';
  [...bookmarks].reverse().forEach(b => {
    const div = document.createElement('div');
    div.className = 'si' + (b.url === curUrl ? ' cur' : '');
    div.innerHTML =
      `<span class="si-ico">${emoji(b.url)}</span>
       <div class="si-body">
         <div class="si-title">${esc(b.title || b.url)}</div>
         <div class="si-url">${esc(short(b.url))}</div>
       </div>
       <button class="si-del" title="Remove">✕</button>`;
    div.querySelector('.si-del').addEventListener('click', ev => {
      ev.stopPropagation();
      removeBookmark(b.url);
    });
    div.addEventListener('click', () => {
      navigate(b.url);
      if (window.innerWidth <= 640) sidebar.classList.add('closed');
    });
    el.appendChild(div);
  });
}

function renderAll() { renderHist(); renderBkms(); updateStarBtn(); updateNav(); }

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function short(url) {
  try { const u = new URL(url); return u.hostname + (u.pathname !== '/' ? u.pathname.slice(0, 30) : ''); }
  catch { return String(url).slice(0, 36); }
}
function emoji(url) {
  try {
    const h = new URL(url).hostname.replace(/^www\./,'');
    const m = {
      'github.com':'🐙','wikipedia.org':'📖','youtube.com':'▶️',
      'reddit.com':'🤖','twitter.com':'🐦','x.com':'🐦',
      'google.com':'🔍','stackoverflow.com':'💬','medium.com':'✍️',
      'bbc.com':'📡','bbc.co.uk':'📡','news.ycombinator.com':'🟠',
      'developer.mozilla.org':'📘','vercel.com':'▲','netlify.com':'🌐',
      'notion.so':'📝','figma.com':'🎨','amazon.com':'📦',
      'instagram.com':'📸','facebook.com':'📘','linkedin.com':'💼',
    };
    if (m[h]) return m[h];
    if (h.includes('news')) return '📰';
    if (h.includes('shop')||h.includes('store')) return '🛒';
    if (h.includes('blog')) return '✍️';
    if (h.includes('doc')) return '📄';
    return '🌐';
  } catch { return '🌐'; }
}
function toast(msg, type) {
  const tc = G('toasts');
  const t  = document.createElement('div');
  t.className = 'toast ' + (type || '');
  t.textContent = (type==='ok'?'✓ ':type==='err'?'✕ ':'')+msg;
  tc.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── EVENT LISTENERS ───────────────────────────────────────────────────────────

// URL bar
G('gobtn').addEventListener('click', () => navigate(urli.value));
urli.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(urli.value); });

// Home screen
G('hgo').addEventListener('click', () => navigate(G('hi').value));
G('hi').addEventListener('keydown', e => { if (e.key === 'Enter') navigate(G('hi').value); });
document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => navigate(c.dataset.url));
});

// Back / Forward
G('btn-bk').addEventListener('click', () => {
  if (navIdx > 0) { navIdx--; _doLoad(navStack[navIdx]); }
});
G('btn-fw').addEventListener('click', () => {
  if (navIdx < navStack.length - 1) { navIdx++; _doLoad(navStack[navIdx]); }
});

// Reload
G('btn-rl').addEventListener('click', () => {
  if (curUrl) _doLoad(curUrl);
});

// Home
G('btn-hm').addEventListener('click', goHome);
G('btn-errhm').addEventListener('click', goHome);

// Bookmark
G('btn-star').addEventListener('click', addBookmark);

// Retry
G('btn-retry').addEventListener('click', () => {
  ovErr.classList.remove('show');
  if (curLoadUrl) navigate(curLoadUrl);
});

// Open real URL in new tab
G('btn-ext').addEventListener('click', () => { if (curUrl) window.open(curUrl, '_blank'); });

// Sidebar toggle — only toggles CSS class, never touches iframe
G('btn-sb').addEventListener('click', () => {
  const isOpen = !sidebar.classList.contains('closed');
  sidebar.classList.toggle('closed', isOpen);
  G('btn-sb').classList.toggle('on', !isOpen);
});

// Sidebar tabs
document.querySelectorAll('.stab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.stab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.spanel').forEach(p => p.classList.remove('on'));
    tab.classList.add('on');
    G('panel-' + tab.dataset.panel).classList.add('on');
  });
});

// Clear history
G('btn-clrhist').addEventListener('click', () => {
  history2 = [];
  renderHist();
  save();
  toast('History cleared');
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'l') { e.preventDefault(); urli.focus(); urli.select(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'd') { e.preventDefault(); addBookmark(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'b') { e.preventDefault(); G('btn-sb').click(); }
  if (e.altKey && e.key === 'ArrowLeft')  G('btn-bk').click();
  if (e.altKey && e.key === 'ArrowRight') G('btn-fw').click();
});

// ── BOOT ──────────────────────────────────────────────────────────────────────
async function boot() {
  G('home-sid').textContent = 'Session: ' + sessionId.slice(0, 12) + '…';
  G('ssid').textContent = sessionId.slice(0, 10) + '…';

  // Register session with server (optional, server is stateless)
  try {
    const r = await fetch('/api/session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId }),
    });
    const data = await r.json();
    if (data.sessionId) {
      sessionId = data.sessionId;
      lsSet(K.SID, sessionId);
    }
  } catch {}

  renderAll();
}

boot();
</script>
