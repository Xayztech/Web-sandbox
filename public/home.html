<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>WebSandbox v3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #080810;
      --surface:    #0f0f1a;
      --surface2:   #16162a;
      --border:     #1c1c30;
      --border2:    #252540;
      --accent:     #6c47ff;
      --accent-h:   #8c6fff;
      --teal:       #00c9b1;
      --red:        #ff5555;
      --text:       #dde1f0;
      --muted:      #5a5a80;
      --dim:        #2a2a48;
      --glow:       rgba(108,71,255,.3);
      --radius:     10px;
      --bar:        50px;
      --sb:         272px;
      --mono:       'JetBrains Mono', monospace;
      --sans:       'Manrope', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--sans); }

    /* ── APP SHELL ── */
    #app { display: flex; flex-direction: column; height: 100dvh; width: 100vw; }

    /* ── TOP BAR ── */
    #topbar {
      height: var(--bar); min-height: var(--bar);
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px; padding: 0 10px;
      flex-shrink: 0; z-index: 200; position: relative;
    }
    .logo {
      font-weight: 800; font-size: 14px; white-space: nowrap;
      display: flex; align-items: center; gap: 7px; flex-shrink: 0;
      letter-spacing: -.3px;
    }
    .logo-sq {
      width: 26px; height: 26px; background: var(--accent);
      border-radius: 7px; display: grid; place-items: center; font-size: 13px;
    }
    .tb-btn {
      width: 32px; height: 32px; flex-shrink: 0;
      border-radius: 8px; border: 1px solid var(--border2);
      background: transparent; color: var(--muted); font-size: 15px;
      cursor: pointer; display: grid; place-items: center;
      transition: background .12s, color .12s;
    }
    .tb-btn:hover:not(:disabled) { background: var(--border); color: var(--text); }
    .tb-btn:disabled { opacity: .28; cursor: default; }
    .tb-btn.on { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── URL BAR ── */
    #urlwrap {
      flex: 1; min-width: 0; height: 34px;
      display: flex; align-items: center; overflow: hidden;
      background: var(--bg); border: 1.5px solid var(--border2);
      border-radius: 8px; transition: border-color .15s, box-shadow .15s;
    }
    #urlwrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
    #scheme-badge {
      padding: 0 9px; font-family: var(--mono); font-size: 10px; font-weight: 700;
      color: var(--teal); white-space: nowrap; border-right: 1px solid var(--border2);
      height: 100%; display: flex; align-items: center; background: var(--surface);
      letter-spacing: .5px;
    }
    #urlinput {
      flex: 1; min-width: 0; background: transparent; border: none; outline: none;
      color: var(--text); font-family: var(--mono); font-size: 12.5px; padding: 0 10px; height: 100%;
    }
    #urlinput::placeholder { color: var(--dim); }
    #gobtn {
      height: 100%; padding: 0 14px; background: var(--accent); border: none;
      color: #fff; font-family: var(--sans); font-weight: 800; font-size: 12px;
      cursor: pointer; letter-spacing: .4px; transition: background .12s; flex-shrink: 0;
    }
    #gobtn:hover { background: var(--accent-h); }

    /* ── MAIN ── */
    #main { display: flex; flex: 1; min-height: 0; }

    /* ── SIDEBAR ── */
    #sidebar {
      width: var(--sb); flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
      transition: width .22s cubic-bezier(.4,0,.2,1), opacity .22s;
    }
    #sidebar.closed { width: 0; opacity: 0; pointer-events: none; }

    .sb-tabs { display: flex; flex-shrink: 0; border-bottom: 1px solid var(--border); }
    .sbt {
      flex: 1; padding: 10px 0; text-align: center; cursor: pointer;
      font-size: 10px; font-weight: 700; letter-spacing: .9px;
      text-transform: uppercase; color: var(--muted);
      border-bottom: 2px solid transparent; transition: color .12s, border-color .12s;
      white-space: nowrap; overflow: hidden;
    }
    .sbt.on { color: var(--accent); border-bottom-color: var(--accent); }
    .sbt:hover:not(.on) { color: var(--text); }

    .sb-panel { flex: 1; min-height: 0; overflow-y: auto; padding: 10px; display: none; }
    .sb-panel.on { display: flex; flex-direction: column; }
    .sb-panel::-webkit-scrollbar { width: 3px; }
    .sb-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    .sb-sec { font-size: 9px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--dim); padding: 8px 4px 5px; }

    .sitem {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 8px; border-radius: 8px; cursor: pointer;
      transition: background .1s; margin-bottom: 2px; min-width: 0;
      border: 1px solid transparent;
    }
    .sitem:hover { background: var(--surface2); border-color: var(--border2); }
    .sitem.active-item { background: rgba(108,71,255,.12); border-color: rgba(108,71,255,.3); }

    .sitem-ico { font-size: 14px; flex-shrink: 0; width: 18px; text-align: center; }
    .sitem-body { flex: 1; min-width: 0; }
    .sitem-title {
      font-size: 12px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text);
    }
    .sitem-url {
      font-size: 10px; font-family: var(--mono);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--muted);
    }
    .sitem-del {
      width: 20px; height: 20px; display: grid; place-items: center;
      background: none; border: none; color: var(--dim); cursor: pointer;
      border-radius: 4px; font-size: 13px; opacity: 0; transition: opacity .1s, color .1s;
      flex-shrink: 0;
    }
    .sitem:hover .sitem-del { opacity: 1; }
    .sitem-del:hover { color: var(--red); }

    .sb-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; color: var(--dim); font-size: 11px; line-height: 1.9; gap: 6px;
    }
    .sb-empty-icon { font-size: 26px; }

    .clear-all {
      margin-top: auto; padding: 7px 10px; background: transparent;
      border: 1px solid var(--border2); border-radius: 8px;
      color: var(--muted); cursor: pointer; font-family: var(--sans);
      font-size: 11px; font-weight: 700; letter-spacing: .4px;
      transition: background .12s, color .12s, border-color .12s;
    }
    .clear-all:hover { background: var(--red); border-color: var(--red); color: #fff; }

    /* ── CONTENT AREA ── */
    #content { flex: 1; min-width: 0; display: flex; flex-direction: column; position: relative; }

    /* ── HOME ── */
    #home {
      position: absolute; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 28px; padding: 20px;
      background: var(--bg);
    }
    .home-hero { text-align: center; }
    .home-hero h1 {
      font-size: clamp(30px, 6vw, 60px); font-weight: 800;
      letter-spacing: -2.5px; line-height: 1.05; margin-bottom: 10px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--teal) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .home-hero p { font-size: 13px; color: var(--muted); font-family: var(--mono); }
    .home-box {
      width: min(580px,100%); background: var(--surface);
      border: 1.5px solid var(--border2); border-radius: 14px; overflow: hidden;
      box-shadow: 0 0 48px var(--glow);
    }
    .home-box:focus-within { border-color: var(--accent); }
    .home-input-row { display: flex; align-items: center; padding: 12px 14px; gap: 8px; }
    .home-globe { font-size: 17px; }
    #home-input {
      flex: 1; min-width: 0; background: transparent; border: none; outline: none;
      color: var(--text); font-family: var(--mono); font-size: 13.5px;
    }
    #home-input::placeholder { color: var(--dim); }
    #home-go {
      padding: 8px 18px; background: var(--accent); border: none;
      border-radius: 8px; color: #fff; font-family: var(--sans);
      font-weight: 800; font-size: 12px; cursor: pointer; flex-shrink: 0;
      transition: background .12s;
    }
    #home-go:hover { background: var(--accent-h); }
    .chips { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; width: min(580px,100%); }
    .chip {
      padding: 6px 13px; background: var(--surface); border: 1px solid var(--border2);
      border-radius: 20px; font-size: 11px; font-family: var(--mono);
      color: var(--muted); cursor: pointer; transition: all .12s;
    }
    .chip:hover { background: var(--surface2); border-color: var(--accent); color: var(--text); }
    .sid-badge {
      font-size: 10px; font-family: var(--mono); color: var(--muted);
      display: flex; align-items: center; gap: 6px;
    }
    .sid-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); }

    /* ── OVERLAYS ── */
    .overlay {
      position: absolute; inset: 0; z-index: 20;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg); gap: 18px; padding: 32px; text-align: center;
    }
    .overlay.show { display: flex; }

    /* loading */
    .spin {
      width: 44px; height: 44px; border-radius: 50%;
      border: 3px solid var(--border2); border-top-color: var(--accent);
      animation: spin .7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-url {
      font-family: var(--mono); font-size: 12px; color: var(--muted);
      max-width: 380px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }
    .load-tip { font-size: 10px; color: var(--dim); font-family: var(--mono); }

    /* error */
    .err-code { font-size: 80px; font-weight: 900; letter-spacing: -5px; color: var(--red); line-height: 1; }
    .err-msg { font-size: 13px; color: var(--muted); max-width: 440px; line-height: 1.7; }
    .err-url { font-size: 10px; font-family: var(--mono); color: var(--dim); word-break: break-all; max-width: 440px; }
    .err-btns { display: flex; gap: 10px; }
    .btn-primary { padding: 9px 22px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-family: var(--sans); font-weight: 800; font-size: 12px; cursor: pointer; transition: background .12s; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-secondary { padding: 9px 22px; background: transparent; border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: var(--sans); font-weight: 700; font-size: 12px; cursor: pointer; }

    /* ── IFRAME ── */
    #frame { flex: 1; border: none; background: #fff; display: none; width: 100%; min-height: 0; }

    /* ── STATUS BAR ── */
    #statusbar {
      height: 22px; background: var(--surface); border-top: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 12px; gap: 12px; flex-shrink: 0;
    }
    .s-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--dim); flex-shrink: 0; }
    .s-dot.ok { background: #22c55e; }
    .s-dot.busy { background: var(--accent); animation: pulse 1s infinite; }
    .s-dot.err { background: var(--red); }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.25} }
    #s-text { flex: 1; font-size: 10px; font-family: var(--mono); color: var(--dim); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    #s-sid { font-size: 10px; font-family: var(--mono); color: var(--dim); white-space: nowrap; flex-shrink: 0; }

    /* ── TOAST ── */
    #toasts { position: fixed; bottom: 36px; right: 14px; z-index: 9999; display: flex; flex-direction: column-reverse; gap: 7px; pointer-events: none; }
    .toast {
      padding: 9px 14px; background: var(--surface2);
      border: 1px solid var(--border2); border-radius: 8px; font-size: 11px;
      color: var(--text); box-shadow: 0 4px 20px rgba(0,0,0,.5);
      pointer-events: all; animation: tfade .18s ease-out; display: flex; align-items: center; gap: 7px;
    }
    .toast.ok  { border-color: #22c55e; }
    .toast.err { border-color: var(--red); }
    @keyframes tfade { from { transform: translateX(18px); opacity: 0; } }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      :root { --sb: 100vw; }
      #sidebar {
        position: absolute; top: 0; bottom: 0; left: 0; z-index: 150;
        box-shadow: 4px 0 24px rgba(0,0,0,.6);
      }
      #sidebar.closed { width: 0; }
      .logo-label { display: none; }
    }
    @media (max-width: 400px) {
      #gobtn { padding: 0 8px; font-size: 11px; }
      #topbar { gap: 4px; padding: 0 6px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ── TOP BAR ── -->
  <div id="topbar">
    <div class="logo">
      <div class="logo-sq">🛡</div>
      <span class="logo-label">WebSandbox</span>
    </div>
    <button class="tb-btn" id="btn-sb"    title="Toggle sidebar">☰</button>
    <button class="tb-btn" id="btn-back"  title="Back"    disabled>‹</button>
    <button class="tb-btn" id="btn-fwd"   title="Forward" disabled>›</button>
    <button class="tb-btn" id="btn-rel"   title="Reload">↺</button>
    <button class="tb-btn" id="btn-hm"    title="Home">⌂</button>
    <div id="urlwrap">
      <div id="scheme-badge">SANDBOX</div>
      <input id="urlinput" type="text" placeholder="Enter any URL…" autocomplete="off" spellcheck="false" />
      <button id="gobtn">GO</button>
    </div>
    <button class="tb-btn" id="btn-bk"   title="Bookmark">☆</button>
    <button class="tb-btn" id="btn-open" title="Open in tab">↗</button>
  </div>

  <!-- ── MAIN ── -->
  <div id="main">

    <!-- ── SIDEBAR ── -->
    <div id="sidebar" class="closed">
      <div class="sb-tabs">
        <div class="sbt on" data-tab="history">⏱ History</div>
        <div class="sbt"    data-tab="bookmarks">☆ Saved</div>
      </div>
      <div class="sb-panel on" id="panel-history">
        <div class="sb-sec">Recent</div>
        <div id="hist-list"></div>
        <button class="clear-all" id="btn-clrhist">Clear history</button>
      </div>
      <div class="sb-panel" id="panel-bookmarks">
        <div class="sb-sec">Bookmarks</div>
        <div id="bk-list"></div>
      </div>
    </div>

    <!-- ── CONTENT ── -->
    <div id="content">

      <!-- HOME -->
      <div id="home">
        <div class="home-hero">
          <h1>WebSandbox</h1>
          <p>// proxy-isolated browser · all sessions saved locally</p>
        </div>
        <div class="home-box">
          <div class="home-input-row">
            <span class="home-globe">🌐</span>
            <input id="home-input" type="url" inputmode="url" placeholder="https://example.com" autocomplete="off" spellcheck="false" />
            <button id="home-go">Browse</button>
          </div>
        </div>
        <div class="chips">
          <div class="chip" data-url="https://wikipedia.org">wikipedia</div>
          <div class="chip" data-url="https://news.ycombinator.com">hacker news</div>
          <div class="chip" data-url="https://github.com">github</div>
          <div class="chip" data-url="https://developer.mozilla.org">mdn</div>
          <div class="chip" data-url="https://www.reddit.com">reddit</div>
          <div class="chip" data-url="https://stackoverflow.com">stackoverflow</div>
          <div class="chip" data-url="https://www.bbc.com/news">bbc news</div>
          <div class="chip" data-url="https://www.youtube.com">youtube</div>
        </div>
        <div class="sid-badge">
          <div class="sid-dot"></div>
          <span id="home-sid">Loading session…</span>
        </div>
      </div>

      <!-- LOADING -->
      <div class="overlay" id="ov-load">
        <div class="spin"></div>
        <div class="load-url" id="load-url">Fetching…</div>
        <div class="load-tip" id="load-tip">Trying multiple strategies…</div>
      </div>

      <!-- ERROR -->
      <div class="overlay" id="ov-err">
        <div class="err-code">ERR</div>
        <div class="err-msg"  id="err-msg">Could not load the page.</div>
        <div class="err-url"  id="err-url"></div>
        <div class="err-btns">
          <button class="btn-primary"   id="btn-retry">Retry</button>
          <button class="btn-secondary" id="btn-err-home">Home</button>
        </div>
      </div>

      <!-- IFRAME -->
      <iframe id="frame"
        allow="forms; scripts; same-origin; popups; pointer-lock; download"
        referrerpolicy="no-referrer-when-downgrade"
        title="Sandbox">
      </iframe>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div id="statusbar">
    <div class="s-dot" id="sdot"></div>
    <div id="s-text">Ready</div>
    <div id="s-sid">—</div>
  </div>
</div>

<!-- TOASTS -->
<div id="toasts"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   WebSandbox v3 — Frontend
   Fixes:
   - Links in history/bookmarks now navigate correctly
   - Sidebar toggle works without breaking iframe
   - window.open / target=_blank fully blocked
   - URL bar always shows current page
   - Persistent state via localStorage + server sync
═══════════════════════════════════════════════════════════════════ */
'use strict';

// ── DOM REFS ────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const frame    = $('frame');
const home     = $('home');
const ovLoad   = $('ov-load');
const ovErr    = $('ov-err');
const sidebar  = $('sidebar');
const urlinput = $('urlinput');
const sdot     = $('sdot');
const stext    = $('s-text');

// ── STATE ────────────────────────────────────────────────────────────
const LS_SID    = 'wsb_sid_v3';
const LS_STATE  = 'wsb_state_v3';

let sessionId    = null;
let curUrl       = '';
let curTitle     = '';
let navStack     = [];  // URL stack for back/forward
let navIdx       = -1;
let loadingUrl   = '';
let loadTimer    = null;
let retryTips    = ['Trying desktop UA…', 'Trying mobile UA…', 'Trying minimal headers…', 'Trying Googlebot UA…'];
let tipIdx       = 0;
let tipTimer     = null;

let state = {
  history:   [],
  bookmarks: [],
};

// ── SESSION INIT ─────────────────────────────────────────────────────
async function init() {
  // Restore from localStorage first (instant, works offline)
  const savedSid   = localStorage.getItem(LS_SID);
  const savedState = localStorage.getItem(LS_STATE);
  if (savedState) {
    try {
      const s = JSON.parse(savedState);
      if (s.history)   state.history   = s.history;
      if (s.bookmarks) state.bookmarks = s.bookmarks;
      if (s.curUrl)    curUrl          = s.curUrl;
      if (s.curTitle)  curTitle        = s.curTitle;
      if (s.navStack)  navStack        = s.navStack;
      if (s.navIdx !== undefined) navIdx = s.navIdx;
    } catch {}
  }

  // Get or create session from server
  try {
    const r = await fetch('/api/session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: savedSid }),
    });
    const data = await r.json();
    sessionId = data.sessionId;
    localStorage.setItem(LS_SID, sessionId);
    // Merge server state if richer
    if (data.session) {
      if ((data.session.history || []).length > state.history.length)
        state.history = data.session.history;
      if ((data.session.bookmarks || []).length > state.bookmarks.length)
        state.bookmarks = data.session.bookmarks;
    }
  } catch {
    sessionId = savedSid || ('local-' + Math.random().toString(36).slice(2,10));
    localStorage.setItem(LS_SID, sessionId);
  }

  persist();
  renderAll();
  updateSidBadge();

  if (curUrl) urlinput.value = curUrl;
}

function persist() {
  localStorage.setItem(LS_STATE, JSON.stringify({
    history:   state.history,
    bookmarks: state.bookmarks,
    curUrl, curTitle, navStack, navIdx,
  }));
}

async function syncServer() {
  if (!sessionId || sessionId.startsWith('local-')) return;
  try {
    await fetch(`/api/session/${sessionId}/save`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ history: state.history, bookmarks: state.bookmarks, currentUrl: curUrl, currentTitle: curTitle }),
    });
  } catch {}
}

// Auto-save every 8 seconds
setInterval(() => { persist(); syncServer(); }, 8000);
window.addEventListener('beforeunload', persist);
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') { persist(); syncServer(); } });

function updateSidBadge() {
  const short = sessionId ? sessionId.slice(0, 10) + '…' : '…';
  $('home-sid').textContent = 'Session: ' + short;
  $('s-sid').textContent     = short;
}

// ── NAVIGATION ───────────────────────────────────────────────────────
function normalize(raw) {
  if (!raw) return null;
  raw = raw.trim();
  if (!raw) return null;
  if (!/^https?:\/\//i.test(raw)) raw = 'https://' + raw;
  try { return new URL(raw).href; } catch { return null; }
}

function navigate(rawUrl) {
  const url = normalize(rawUrl);
  if (!url) { toast('Invalid URL', 'err'); return; }

  // Update nav stack
  if (navIdx < navStack.length - 1) navStack = navStack.slice(0, navIdx + 1);
  if (navStack[navStack.length - 1] !== url) {
    navStack.push(url);
    navIdx = navStack.length - 1;
  }

  _load(url);
}

function _load(url) {
  loadingUrl = url;
  curUrl     = url;
  urlinput.value = url;

  // Show loading state
  home.style.display   = 'none';
  frame.style.display  = 'none';
  ovErr.classList.remove('show');
  ovLoad.classList.add('show');
  $('load-url').textContent = url;
  tipIdx = 0;
  $('load-tip').textContent = retryTips[0];

  setStatus('busy', 'Loading…');
  updateNavBtns();

  // Cycle loading tips
  clearInterval(tipTimer);
  tipTimer = setInterval(() => {
    tipIdx = (tipIdx + 1) % retryTips.length;
    $('load-tip').textContent = retryTips[tipIdx];
  }, 3500);

  // Timeout guard
  clearTimeout(loadTimer);
  loadTimer = setTimeout(() => {
    clearInterval(tipTimer);
    ovLoad.classList.remove('show');
    showError('Request timed out after 30s. The site may be very slow or unreachable.', url);
  }, 30000);

  const proxyUrl = `/proxy?url=${encodeURIComponent(url)}&sid=${encodeURIComponent(sessionId || '')}`;
  frame.src = proxyUrl;
}

frame.addEventListener('load', () => {
  clearTimeout(loadTimer);
  clearInterval(tipTimer);

  const src = frame.src;
  if (!src || src === 'about:blank' || src === location.href) return;

  // Try to get title from iframe document
  let iTitle = curTitle;
  try {
    const iDoc = frame.contentDocument;
    if (iDoc && iDoc.title) iTitle = iDoc.title.trim();
  } catch {}

  // Check if the iframe returned an error page (server-sent error)
  try {
    const iDoc = frame.contentDocument;
    if (iDoc) {
      const body = (iDoc.body || {}).innerText || '';
      // Our error pages post a message; don't do anything here yet
    }
  } catch {}

  ovLoad.classList.remove('show');
  frame.style.display = 'block';
  setStatus('ok', 'Loaded: ' + loadingUrl);

  // Add to history
  addHistory(loadingUrl, iTitle || loadingUrl);
  curTitle = iTitle || loadingUrl;
  persist();
  syncServer();
});

frame.addEventListener('error', () => {
  clearTimeout(loadTimer);
  clearInterval(tipTimer);
  ovLoad.classList.remove('show');
  showError('iframe failed to load. The site may block embedding.', loadingUrl);
});

// ── Messages from sandboxed page ──────────────────────────────────────
window.addEventListener('message', e => {
  if (!e.data || typeof e.data !== 'object') return;
  const { type, url, title, message } = e.data;

  switch (type) {
    case 'navigate':
      if (url) { clearTimeout(loadTimer); clearInterval(tipTimer); navigate(url); }
      break;
    case 'softNav':
      if (url) {
        curUrl = url;
        urlinput.value = url;
        addHistory(url, title || url);
        persist();
      }
      break;
    case 'pageLoaded':
      clearTimeout(loadTimer);
      clearInterval(tipTimer);
      ovLoad.classList.remove('show');
      frame.style.display = 'block';
      if (url) { curUrl = url; urlinput.value = url; }
      if (title) curTitle = title;
      addHistory(url || loadingUrl, title || loadingUrl);
      setStatus('ok', 'Loaded: ' + (url || loadingUrl));
      persist();
      break;
    case 'proxyError':
      clearTimeout(loadTimer);
      clearInterval(tipTimer);
      ovLoad.classList.remove('show');
      frame.style.display = 'none';
      showError(message || 'Failed to load page', url || loadingUrl);
      break;
    case 'retryNav':
      if (url) navigate(url);
      break;
    case 'goHome':
      goHome();
      break;
  }
});

function showError(msg, url) {
  frame.style.display = 'none';
  try { frame.src = 'about:blank'; } catch {}
  ovLoad.classList.remove('show');
  ovErr.classList.add('show');
  $('err-msg').textContent = msg || 'Unknown error';
  $('err-url').textContent = url || '';
  setStatus('err', 'Error');
}

function goHome() {
  clearTimeout(loadTimer);
  clearInterval(tipTimer);
  try { frame.src = 'about:blank'; } catch {}
  frame.style.display = 'none';
  ovLoad.classList.remove('show');
  ovErr.classList.remove('show');
  home.style.removeProperty('display');
  urlinput.value = '';
  setStatus('', 'Ready');
}

function updateNavBtns() {
  $('btn-back').disabled = navIdx <= 0;
  $('btn-fwd').disabled  = navIdx >= navStack.length - 1;
}

function setStatus(type, text) {
  sdot.className = 's-dot ' + (type === 'ok' ? 'ok' : type === 'busy' ? 'busy' : type === 'err' ? 'err' : '');
  stext.textContent = text;
}

// ── HISTORY ──────────────────────────────────────────────────────────
function addHistory(url, title) {
  if (!url) return;
  const last = state.history[state.history.length - 1];
  if (last && last.url === url) { last.title = title || last.title; renderAll(); return; }
  state.history.push({ url, title: title || url, visitedAt: Date.now() });
  if (state.history.length > 300) state.history = state.history.slice(-300);
  renderAll();
}

function removeHistory(idx) {
  state.history.splice(idx, 1);
  renderAll();
  persist();
}

// ── BOOKMARKS ────────────────────────────────────────────────────────
async function addBookmark() {
  if (!curUrl) { toast('Navigate to a page first', 'err'); return; }
  if (state.bookmarks.find(b => b.url === curUrl)) { toast('Already bookmarked', 'err'); return; }
  state.bookmarks.push({ url: curUrl, title: curTitle || curUrl, addedAt: Date.now() });
  $('btn-bk').classList.add('on');
  $('btn-bk').textContent = '★';
  renderAll();
  persist();
  try {
    await fetch(`/api/session/${sessionId}/bookmark`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: curUrl, title: curTitle }),
    });
  } catch {}
  toast('Bookmarked!', 'ok');
}

function removeBookmark(url) {
  state.bookmarks = state.bookmarks.filter(b => b.url !== url);
  if (url === curUrl) { $('btn-bk').classList.remove('on'); $('btn-bk').textContent = '☆'; }
  renderAll();
  persist();
}

function isBookmarked(url) {
  return !!state.bookmarks.find(b => b.url === url);
}

// ── RENDER SIDEBAR ────────────────────────────────────────────────────
function renderAll() {
  renderHistory();
  renderBookmarks();
  updateBookmarkBtn();
}

function renderHistory() {
  const el = $('hist-list');
  if (!state.history.length) {
    el.innerHTML = '<div class="sb-empty"><div class="sb-empty-icon">⏱</div>No history yet.<br>Start browsing!</div>';
    return;
  }
  el.innerHTML = '';
  const reversed = [...state.history].reverse();
  reversed.forEach((h, ri) => {
    const realIdx = state.history.length - 1 - ri;
    const d = document.createElement('div');
    d.className = 'sitem' + (h.url === curUrl ? ' active-item' : '');
    // FIX: use data-url attribute and click handler properly
    d.innerHTML = `
      <span class="sitem-ico">${siteEmoji(h.url)}</span>
      <div class="sitem-body">
        <div class="sitem-title">${esc(h.title || h.url)}</div>
        <div class="sitem-url">${esc(shortUrl(h.url))}</div>
      </div>
      <button class="sitem-del" data-idx="${realIdx}" title="Remove">✕</button>`;
    d.addEventListener('click', e => {
      if (e.target.classList.contains('sitem-del')) {
        e.stopPropagation();
        removeHistory(parseInt(e.target.dataset.idx));
        return;
      }
      navigate(h.url);
      // Close sidebar on mobile
      if (window.innerWidth <= 640) sidebar.classList.add('closed');
    });
    el.appendChild(d);
  });
}

function renderBookmarks() {
  const el = $('bk-list');
  if (!state.bookmarks.length) {
    el.innerHTML = '<div class="sb-empty"><div class="sb-empty-icon">☆</div>No bookmarks.<br>Press ☆ to save.</div>';
    return;
  }
  el.innerHTML = '';
  [...state.bookmarks].reverse().forEach(b => {
    const d = document.createElement('div');
    d.className = 'sitem' + (b.url === curUrl ? ' active-item' : '');
    d.innerHTML = `
      <span class="sitem-ico">${siteEmoji(b.url)}</span>
      <div class="sitem-body">
        <div class="sitem-title">${esc(b.title || b.url)}</div>
        <div class="sitem-url">${esc(shortUrl(b.url))}</div>
      </div>
      <button class="sitem-del" data-url="${esc(b.url)}" title="Remove">✕</button>`;
    d.addEventListener('click', e => {
      if (e.target.classList.contains('sitem-del')) {
        e.stopPropagation();
        removeBookmark(e.target.dataset.url);
        return;
      }
      navigate(b.url);
      if (window.innerWidth <= 640) sidebar.classList.add('closed');
    });
    el.appendChild(d);
  });
}

function updateBookmarkBtn() {
  const bk = isBookmarked(curUrl);
  $('btn-bk').classList.toggle('on', bk);
  $('btn-bk').textContent = bk ? '★' : '☆';
}

// ── UTIL ─────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function shortUrl(url) {
  try {
    const u = new URL(url);
    return u.hostname + (u.pathname !== '/' ? u.pathname.slice(0, 28) : '');
  } catch { return String(url).slice(0, 36); }
}
function siteEmoji(url) {
  try {
    const h = new URL(url).hostname.replace(/^www\./, '');
    const map = {
      'github.com':'🐙','wikipedia.org':'📖','youtube.com':'▶️','reddit.com':'🤖',
      'twitter.com':'🐦','x.com':'🐦','google.com':'🔍','stackoverflow.com':'💬',
      'medium.com':'✍️','bbc.com':'📡','bbc.co.uk':'📡','news.ycombinator.com':'🟠',
      'developer.mozilla.org':'📘','docs.google.com':'📄','drive.google.com':'📁',
      'gmail.com':'✉️','notion.so':'📝','figma.com':'🎨','vercel.com':'▲',
      'netlify.com':'🌐','cloudflare.com':'☁️','amazon.com':'📦',
    };
    if (map[h]) return map[h];
    // Check includes
    if (h.includes('google')) return '🔍';
    if (h.includes('news'))   return '📰';
    if (h.includes('shop'))   return '🛒';
    return '🌐';
  } catch { return '🌐'; }
}

// ── TOAST ────────────────────────────────────────────────────────────
function toast(msg, type) {
  const tc = $('toasts');
  const t  = document.createElement('div');
  t.className = 'toast ' + (type || '');
  t.textContent = (type === 'ok' ? '✓ ' : type === 'err' ? '✕ ' : '') + msg;
  tc.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── EVENT LISTENERS ───────────────────────────────────────────────────

// URL bar navigation
$('gobtn').addEventListener('click', () => navigate(urlinput.value));
urlinput.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(urlinput.value); });

// Home screen navigation
$('home-go').addEventListener('click', () => navigate($('home-input').value));
$('home-input').addEventListener('keydown', e => { if (e.key === 'Enter') navigate(e.target.value); });

// Quick chips
document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => navigate(c.dataset.url));
});

// Back / Forward
$('btn-back').addEventListener('click', () => {
  if (navIdx > 0) { navIdx--; _load(navStack[navIdx]); updateNavBtns(); }
});
$('btn-fwd').addEventListener('click', () => {
  if (navIdx < navStack.length - 1) { navIdx++; _load(navStack[navIdx]); updateNavBtns(); }
});

// Reload
$('btn-rel').addEventListener('click', () => {
  if (curUrl) _load(curUrl);
  else { try { frame.src = frame.src; } catch {} }
});

// Home
$('btn-hm').addEventListener('click', goHome);
$('btn-err-home').addEventListener('click', goHome);

// Bookmark
$('btn-bk').addEventListener('click', addBookmark);

// Retry
$('btn-retry').addEventListener('click', () => {
  ovErr.classList.remove('show');
  if (loadingUrl) navigate(loadingUrl);
});

// Open in tab
$('btn-open').addEventListener('click', () => { if (curUrl) window.open(curUrl, '_blank'); });

// Sidebar toggle — FIX: was toggling wrong element / conflicting with iframe
$('btn-sb').addEventListener('click', () => {
  sidebar.classList.toggle('closed');
  $('btn-sb').classList.toggle('on', !sidebar.classList.contains('closed'));
});

// Sidebar tabs
document.querySelectorAll('.sbt').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.sbt').forEach(x => x.classList.remove('on'));
    document.querySelectorAll('.sb-panel').forEach(x => x.classList.remove('on'));
    t.classList.add('on');
    $('panel-' + t.dataset.tab).classList.add('on');
  });
});

// Clear history
$('btn-clrhist').addEventListener('click', async () => {
  state.history = [];
  renderAll();
  persist();
  try { await fetch(`/api/session/${sessionId}/history`, { method: 'DELETE' }); } catch {}
  toast('History cleared');
});

// Keyboard shortcut: Ctrl+L = focus URL bar
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
    e.preventDefault();
    urlinput.focus();
    urlinput.select();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
    e.preventDefault();
    addBookmark();
  }
});

// ── BOOT ──────────────────────────────────────────────────────────────
init();
</script>
